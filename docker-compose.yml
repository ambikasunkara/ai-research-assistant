# ==============================================================================
# AI Research Assistant - docker-compose
#
# The FastAPI layer (fast_api_app.py) is the single container's public
# interface. It spawns the MCP server (mcp_server.py) internally as a stdio
# subprocess per McpToolset -- see agent.py -- so no separate MCP service is
# required for this deployment mode. `reports/` and `logs/` are bind-mounted
# so exported reports and the audit trail survive container restarts.
#
# Usage:
#   cp .env.example .env   # then edit .env with your GOOGLE_API_KEY
#   docker compose up --build
# ==============================================================================
services:
  research-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-research-assistant:latest
    container_name: ai-research-assistant
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
